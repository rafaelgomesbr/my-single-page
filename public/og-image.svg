<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#020617"/>
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.6"/>
  
  <!-- Orb left -->
  <circle cx="200" cy="100" r="200" fill="#0ea5e9" opacity="0.08" filter="url(#blur)"/>
  <!-- Orb right -->
  <circle cx="1000" cy="50" r="180" fill="#6366f1" opacity="0.1" filter="url(#blur)"/>
  
  <!-- Name -->
  <text x="100" y="240" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" letter-spacing="-1">
    Rafael Souza Gomes
  </text>
  
  <!-- Title -->
  <text x="100" y="300" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500">
    Front-end Engineer · +5 anos construindo produtos de escala
  </text>
  
  <!-- Divider -->
  <rect x="100" y="330" width="80" height="3" rx="1.5" fill="#0ea5e9"/>
  
  <!-- Stack pills -->
  <rect x="100" y="360" width="80" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="140" y="381" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">React</text>
  
  <rect x="196" y="360" width="96" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="244" y="381" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Angular</text>
  
  <rect x="308" y="360" width="116" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="366" y="381" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">TypeScript</text>
  
  <rect x="440" y="360" width="84" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="482" y="381" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Node.js</text>
  
  <rect x="540" y="360" width="72" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="576" y="381" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">CI/CD</text>
  
  <!-- Status badge -->
  <rect x="100" y="430" width="260" height="32" rx="16" fill="#064e3b" stroke="#065f46" stroke-width="1"/>
  <circle cx="120" cy="446" r="4" fill="#34d399"/>
  <text x="134" y="452" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Disponível para oportunidades</text>
  
  <!-- Logo -->
  <text x="100" y="560" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="20" font-weight="700">rafael<tspan fill="#0ea5e9">.</tspan>sg</text>
  
  <!-- URL -->
  <text x="1100" y="560" fill="#475569" font-family="system-ui, sans-serif" font-size="16" font-weight="500" text-anchor="end">rafaelgomesbr.dev</text>
  
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <radialGradient id="bg" cx="0.3" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
